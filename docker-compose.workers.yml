services:
  cvm_worker:
    build: .
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=1 -Ofair -Q celery
    env_file:
      - .env
    mem_limit: ${WORKER_MEM_LIMIT:-2560m}
    mem_reservation: ${WORKER_MEM_RESERVATION:-2g}
    cpus: ${WORKER_CPUS:-2.0}
    volumes:
      - .:/app
    deploy:
      replicas: ${WORKER_REPLICAS:-4}
    depends_on:
      cvm_redis:
        condition: service_healthy

  cvm_analise_materializacao_worker:
    build: .
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=1 -Ofair -Q analise_materializacao
    env_file:
      - .env
    mem_limit: ${ANALISE_MATERIALIZACAO_WORKER_MEM_LIMIT:-2560m}
    mem_reservation: ${ANALISE_MATERIALIZACAO_WORKER_MEM_RESERVATION:-2g}
    cpus: ${ANALISE_MATERIALIZACAO_WORKER_CPUS:-2.0}
    volumes:
      - .:/app
    deploy:
      replicas: ${ANALISE_MATERIALIZACAO_WORKER_REPLICAS:-2}
    depends_on:
      cvm_redis:
        condition: service_healthy

  cvm_scheduler:
    build: .
    container_name: cvm_scheduler
    command: sh -lc "python -m app.worker.bootstrap && celery -A app.worker.celery_app beat --loglevel=info"
    env_file:
      - .env

  cvm_redis:
    image: redis:7
    container_name: cvm_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

apiVersion: v1
kind: Service
metadata:
  name: {{ include "tucano-cvm.fullname" . }}
  labels:
    {{- include "tucano-cvm.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
  selector:
    {{- include "tucano-cvm.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api

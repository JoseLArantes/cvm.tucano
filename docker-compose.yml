services:
  cvm_api:
    build: .
    container_name: cvm_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8007 --reload
    ports:
      - "8007:8007"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      cvm_postgres:
        condition: service_healthy
      cvm_redis:
        condition: service_healthy

  cvm_worker:
    build: .
    container_name: cvm_worker
    command: celery -A app.worker.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      cvm_postgres:
        condition: service_healthy
      cvm_redis:
        condition: service_healthy

  cvm_scheduler:
    build: .
    container_name: cvm_scheduler
    command: sh -lc "python -m app.worker.bootstrap && celery -A app.worker.celery_app beat --loglevel=info"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      cvm_postgres:
        condition: service_healthy
      cvm_redis:
        condition: service_healthy

  cvm_postgres:
    image: postgres:16
    container_name: cvm_postgres
    environment:
      POSTGRES_DB: cvm
      POSTGRES_USER: cvm
      POSTGRES_PASSWORD: cvm
    volumes:
      - cvm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cvm -d cvm" ]
      interval: 10s
      timeout: 5s
      retries: 5

  cvm_redis:
    image: redis:7
    container_name: cvm_redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cvm_postgres_data:
